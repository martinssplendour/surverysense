[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/**/*.py" = [
    "E402",
]

[tool.mypy]
python_version = "3.12"
files = [
    "backend/app/main.py",
    "backend/app/application_setup.py",
    "backend/app/features/common/route_context.py",
    "backend/app/features/analysis/routes.py",
    "backend/app/features/analysis/topic_analysis_services/service.py",
    "backend/app/features/ingestion/routes.py",
    "backend/app/features/results/routes.py",
]
mypy_path = "backend"
check_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true
follow_imports = "skip"
