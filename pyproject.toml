[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*.py" = [
    "E402",
]

[tool.mypy]
python_version = "3.12"
files = [
    "app/main.py",
    "app/application_setup.py",
    "app/api/_ingest_route_context.py",
    "app/api/_ingest_analysis_routes.py",
    "app/services/topic_analysis_services/topic_analysis_service.py",
]
check_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true
follow_imports = "skip"
