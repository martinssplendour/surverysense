<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbatim App</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand-lockup">
                <div class="brand-mark" aria-hidden="true">V</div>
                <div>
                    <p class="brand-name">Verbatim App</p>
                </div>
            </div>
            <div class="topbar-actions">
                <a class="button button-ghost topbar-link" href="/auth/logout">Sign Out</a>
                <div class="step-pill" id="step-pill">Step 1 of 2</div>
            </div>
        </header>

        <main class="workflow">
            <section class="view upload-view is-active" id="upload-view" aria-label="Upload CSV">
                <form class="upload-card" id="upload-form">
                    <label class="dropzone" id="dropzone" for="csv-file">
                        <input type="file" id="csv-file" accept=".csv,text/csv" hidden>
                        <span class="dropzone-label">Upload CSV</span>
                        <strong class="dropzone-title" id="file-label">Select a CSV file or drag it here</strong>
                        <span class="dropzone-caption" id="file-meta">Accepted format: .csv</span>
                    </label>

                    <div class="upload-actions">
                        <button type="button" class="button button-secondary" id="choose-file-btn">Choose File</button>
                        <button type="submit" class="button button-primary" id="process-btn" disabled>Process File</button>
                    </div>

                    <p class="status-message status-neutral" id="status-message">Waiting for a CSV upload.</p>
                </form>
            </section>
        </main>
    </div>

    <script src="/static/upload.js" defer></script>
</body>
</html>
