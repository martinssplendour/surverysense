name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff mypy

      - name: Architecture guardrails
        run: python scripts/check_architecture.py

      - name: Ruff
        run: python -m ruff check backend/app backend/tests

      - name: Mypy
        run: python -m mypy

      - name: Backend tests
        run: python -m unittest discover -s backend/tests -t backend

      - name: Frontend static smoke test
        run: python scripts/smoke_frontend_static.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: ESLint
        run: npm run lint -- --max-warnings=0

      - name: Frontend tests
        run: npm test
