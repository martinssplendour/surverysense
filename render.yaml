services:
  - type: web
    name: verbatim-app
    env: python
    buildCommand: cd backend && pip install -r requirements.txt && python download_topic_model.py
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
